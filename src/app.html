<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />

		<!-- SEO -->
		<meta name="description" content="Live surf cams for beaches around Portland, ME" />
		<meta
			name="keywords"
			content="surf cam, cams, maine, Scarborough Beach, Pine Point, Old Orchard Beach, Higgins Beach, Kennebunk Beach, live surf"
		/>

		<!-- Open Graph -->
		<meta property="og:title" content="Maine Surf Cams" />
		<meta property="og:description" content="Live surf cams for beaches around Portland, ME" />
		<meta property="og:url" content="https://surfcams.tuckergordon.dev" />
		<meta property="og:type" content="website" />
		<meta name="theme-color" content="#a3d1ce" />

		<!-- Icons -->
		<link rel="icon" href="%sveltekit.assets%/favicon.png" type="image/png" />
		<link rel="apple-touch-icon" href="%sveltekit.assets%/apple-touch-icon.png" type="image/png" />

		<!-- Fonts -->
		<link rel="preconnect" href="https://fonts.googleapis.com" />
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="" />
		<link
			href="https://fonts.googleapis.com/css2?family=Lobster&family=Quicksand:wght@300..700&display=swap"
			rel="stylesheet"
		/>

		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
